name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --verbose

  build:
    name: Build ${{ matrix.name }}
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: fakekey-linux-amd64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: fakekey-linux-arm64
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: fakekey-macos-amd64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: fakekey-macos-arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: fakekey-windows-amd64
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/fakekey

      - name: Strip binary (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: aarch64-linux-gnu-strip target/${{ matrix.target }}/release/fakekey

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.name }}.tar.gz fakekey
          cd ../../..

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/fakekey.exe -DestinationPath ${{ matrix.name }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.${{ matrix.archive }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} . \;
          find . -type d -empty -delete
          sha256sum *.tar.gz *.zip > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums-sha256.txt
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          SHA256_MACOS_ARM64=$(grep 'fakekey-macos-arm64.tar.gz' artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA256_MACOS_AMD64=$(grep 'fakekey-macos-amd64.tar.gz' artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep 'fakekey-linux-arm64.tar.gz' artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA256_LINUX_AMD64=$(grep 'fakekey-linux-amd64.tar.gz' artifacts/checksums-sha256.txt | awk '{print $1}')

          git clone https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/happyvibing/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # Replace version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/fakekey.rb

          # Replace sha256 by matching the url line, then replacing the next sha256 line
          replace_sha() {
            local pattern=$1
            local new_sha=$2
            sed -i "/${pattern}/{n;s/sha256 \"[a-f0-9]\+\"/sha256 \"${new_sha}\"/}" Formula/fakekey.rb
          }

          replace_sha "fakekey-macos-arm64" "${SHA256_MACOS_ARM64}"
          replace_sha "fakekey-macos-amd64" "${SHA256_MACOS_AMD64}"
          replace_sha "fakekey-linux-arm64" "${SHA256_LINUX_ARM64}"
          replace_sha "fakekey-linux-amd64" "${SHA256_LINUX_AMD64}"

          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add Formula/fakekey.rb
          git diff --staged --quiet || git commit -m "Update fakekey to v${VERSION}"
          git push

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (skip if version already exists)
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Version already published, skipping"
